<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex, follow">
<title>Página não encontrada | Promogg</title><meta name="description" content="Encontre ofertas selecionadas no Promogg."><link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="stylesheet" href="style.css"></head>
<body><main class="detail-page"><div class="container"><section class="empty-state"><h1>Página não encontrada</h1><p>Use a busca para encontrar uma oferta ou volte ao catálogo.</p><form id="busca-404"><label for="termo-404">Buscar ofertas</label><input id="termo-404" type="search" placeholder="Ex.: notebook, TV, tênis"><button class="button button-primary" type="submit">Buscar</button></form><p><a class="button button-secondary" href="/">Ir para a página inicial</a></p><div class="tags"><a class="tag" href="/categoria/a-combustao/">A Combustão</a><a class="tag" href="/categoria/acessorios/">Acessórios</a><a class="tag" href="/categoria/acusticas/">Acústicas</a><a class="tag" href="/categoria/antena-digital/">Antena Digital</a><a class="tag" href="/categoria/antenas-de-tv/">Antenas de TV</a><a class="tag" href="/categoria/aparadores/">Aparadores</a><a class="tag" href="/categoria/ar-condicionado/">Ar Condicionado</a><a class="tag" href="/categoria/ares-condicionados/">Ares Condicionados</a></div><div id="resultado-404" class="offer-grid"></div></section></div></main>
<script>const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));document.querySelector('#busca-404').addEventListener('submit',async(e)=>{e.preventDefault();const t=document.querySelector('#termo-404').value.trim().toLowerCase(),r=document.querySelector('#resultado-404');const d=await fetch('/ofertas.json').then(x=>x.json()).catch(()=>({ofertas:[]}));r.innerHTML=(d.ofertas||[]).filter(o=>(o.titulo||'').toLowerCase().includes(t)).slice(0,10).map(o=>`<article class="offer-card"><div class="offer-body"><h2>${esc(o.titulo)}</h2><p class="offer-price">${esc(o.preco_formatado)}</p><a class="button button-secondary" href="/${esc(o.produto_url)}">Ver detalhes</a></div></article>`).join('')||'<p>Nenhuma oferta encontrada.</p>';});</script></body></html>
